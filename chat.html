<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chetan — Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Hind:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --saffron: #FF6600;
      --green: #138808;
      --navy: #111827;
      --bg: #F7F7F8;
      --sidebar: #fff;
      --border: #E5E7EB;
      --user-bubble: #FFF0E0;
      --ai-bubble: #fff;
    }
    body { font-family: 'Hind', sans-serif; background: var(--bg); color: #222; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* TOP NAV */
    .topbar {
      background: #fff;
      border-bottom: 3px solid transparent;
      border-image: linear-gradient(to right, #FF6600 33%, #fff 33%, #fff 66%, #138808 66%) 1;
      padding: 10px 20px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .topbar-logo { font-family: 'Baloo 2', cursive; font-size: 20px; font-weight: 800; }
    .topbar-logo span:first-child { color: var(--saffron); }
    .topbar-logo span:last-child { color: var(--navy); }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .user-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--saffron); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; font-family: 'Baloo 2', cursive; }
    .back-btn { text-decoration: none; font-size: 13px; color: #666; border: 1px solid #ddd; padding: 5px 12px; border-radius: 6px; }
    .back-btn:hover { background: #f5f5f5; }

    /* MAIN LAYOUT */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* SIDEBAR */
    .sidebar {
      width: 240px; background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 16px 12px;
      flex-shrink: 0;
    }
    .new-chat-btn {
      width: 100%; padding: 10px; background: var(--saffron); color: #fff;
      border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: 'Baloo 2', cursive; margin-bottom: 20px;
      transition: background 0.2s;
    }
    .new-chat-btn:hover { background: #e55a00; }
    .sidebar-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-bottom: 8px; padding: 0 4px; }
    .tool-list { display: flex; flex-direction: column; gap: 4px; }
    .tool-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: 8px; cursor: pointer;
      font-size: 14px; color: #444; transition: background 0.15s;
      border: none; background: none; text-align: left; width: 100%;
    }
    .tool-item:hover { background: #F5F5F5; }
    .tool-item.active { background: #FFF0E0; color: var(--saffron); font-weight: 600; }
    .tool-icon { font-size: 18px; width: 24px; text-align: center; }
    .sidebar-bottom { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border); }
    .india-tag { text-align: center; font-size: 11px; color: #aaa; }

    /* CHAT AREA */
    .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* TOOL HEADER */
    .tool-header {
      background: #fff; border-bottom: 1px solid var(--border);
      padding: 10px 20px; display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    .tool-header-icon { font-size: 22px; }
    .tool-header-name { font-family: 'Baloo 2', cursive; font-size: 17px; font-weight: 700; color: var(--navy); }
    .tool-header-desc { font-size: 12px; color: #aaa; }

    /* MESSAGES */
    .messages {
      flex: 1; overflow-y: auto; padding: 24px 20px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    /* WELCOME */
    .welcome { text-align: center; padding: 40px 20px; }
    .welcome-icon { font-size: 48px; margin-bottom: 12px; }
    .welcome h2 { font-family: 'Baloo 2', cursive; font-size: 26px; color: var(--navy); margin-bottom: 8px; }
    .welcome p { font-size: 15px; color: #777; max-width: 400px; margin: 0 auto 24px; line-height: 1.6; }
    .suggestion-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 500px; margin: 0 auto; }
    .suggestion-btn {
      background: #fff; border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px; text-align: left;
      cursor: pointer; font-size: 13px; color: #444; line-height: 1.5;
      transition: all 0.2s; font-family: 'Hind', sans-serif;
    }
    .suggestion-btn:hover { border-color: var(--saffron); background: #FFF8F5; color: var(--saffron); }
    .suggestion-btn strong { display: block; font-size: 13px; color: #222; margin-bottom: 2px; }

    /* MESSAGE BUBBLES */
    .msg-row { display: flex; gap: 10px; max-width: 780px; width: 100%; }
    .msg-row.user { margin-left: auto; flex-direction: row-reverse; }
    .msg-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; margin-top: 2px; }
    .msg-avatar.ai { background: linear-gradient(135deg, var(--saffron), var(--green)); color: #fff; font-family: 'Baloo 2', cursive; font-weight: 700; font-size: 11px; }
    .msg-avatar.user { background: #EEE; color: #555; }
    .msg-bubble { padding: 12px 16px; border-radius: 14px; font-size: 15px; line-height: 1.7; max-width: 100%; }
    .msg-bubble.ai { background: var(--ai-bubble); border: 1px solid var(--border); border-top-left-radius: 4px; color: #222; }
    .msg-bubble.user { background: var(--saffron); color: #fff; border-top-right-radius: 4px; }
    .msg-name { font-size: 11px; font-weight: 700; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .msg-name.ai { color: var(--saffron); }
    .msg-name.user { color: rgba(255,255,255,0.8); text-align: right; }

    /* TYPING */
    .typing-row { display: flex; gap: 10px; max-width: 780px; }
    .typing-bubble { background: #fff; border: 1px solid var(--border); border-radius: 14px; border-top-left-radius: 4px; padding: 14px 18px; display: flex; gap: 5px; align-items: center; }
    .typing-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--saffron); animation: tdot 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; background: #888; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; background: var(--green); }
    @keyframes tdot { 0%,100%{transform:translateY(0);opacity:0.5} 50%{transform:translateY(-5px);opacity:1} }

    /* INPUT AREA */
    .input-area {
      background: #fff; border-top: 1px solid var(--border);
      padding: 14px 20px; flex-shrink: 0;
    }
    .input-box {
      display: flex; align-items: flex-end; gap: 10px;
      background: #F9F9F9; border: 1.5px solid var(--border);
      border-radius: 14px; padding: 10px 14px;
      transition: border-color 0.2s;
    }
    .input-box:focus-within { border-color: var(--saffron); background: #fff; }
    #userInput {
      flex: 1; border: none; background: transparent; font-size: 15px;
      font-family: 'Hind', sans-serif; color: #222; resize: none;
      outline: none; max-height: 120px; line-height: 1.5;
      min-height: 24px;
    }
    #userInput::placeholder { color: #aaa; }
    .send-btn {
      width: 36px; height: 36px; border-radius: 8px;
      background: var(--saffron); border: none; color: #fff;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.2s; font-size: 16px;
    }
    .send-btn:hover { background: #e55a00; }
    .send-btn:disabled { background: #ddd; cursor: not-allowed; }
    .input-note { text-align: center; font-size: 11px; color: #bbb; margin-top: 8px; }

    /* MOBILE SIDEBAR */
    .sidebar-toggle { display: none; background: none; border: none; font-size: 22px; cursor: pointer; color: #333; }
    @media (max-width: 768px) {
      .sidebar { position: fixed; left: -260px; top: 0; bottom: 0; z-index: 500; transition: left 0.3s; box-shadow: 2px 0 20px rgba(0,0,0,0.1); }
      .sidebar.open { left: 0; }
      .sidebar-toggle { display: block; }
      .suggestion-grid { grid-template-columns: 1fr; }
      .topbar { padding: 10px 14px; }
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div style="display:flex;align-items:center;gap:12px;">
    <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
    <div class="topbar-logo"><span>AI</span><span> Chetan 🇮🇳</span></div>
  </div>
  <div class="topbar-right">
    <a href="index.html" class="back-btn">← Home</a>
    <div class="user-avatar" id="avatarInitial">U</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
    <div class="sidebar-label">All Tools</div>
    <div class="tool-list">
      <button class="tool-item active" id="tool-chat" onclick="switchTool('chat')">
        <span class="tool-icon">💬</span> Smart Q&A
      </button>
      <button class="tool-item" id="tool-webdev" onclick="switchTool('webdev')">
        <span class="tool-icon">💻</span> Web Dev Help
      </button>
      <button class="tool-item" id="tool-website" onclick="switchTool('website')">
        <span class="tool-icon">🌐</span> Website Generator
      </button>
      <button class="tool-item" id="tool-image" onclick="switchTool('image')">
        <span class="tool-icon">🖼️</span> Image Generator
      </button>
      <button class="tool-item" id="tool-video" onclick="switchTool('video')">
        <span class="tool-icon">🎬</span> Short Video
      </button>
      <button class="tool-item" id="tool-voice" onclick="switchTool('voice')">
        <span class="tool-icon">🎙️</span> AI Voice
      </button>
    </div>
    <div class="sidebar-bottom">
      <div class="india-tag">🇮🇳 Made in India · AI Chetan</div>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area">
    <div class="tool-header">
      <div class="tool-header-icon" id="toolIcon">💬</div>
      <div>
        <div class="tool-header-name" id="toolName">Smart Q&A</div>
        <div class="tool-header-desc" id="toolDesc">Ask anything — get accurate answers</div>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="welcome" id="welcomeScreen">
        <div class="welcome-icon">🤖</div>
        <h2>How can I help you today?</h2>
        <p>I am AI Chetan — India's AI. Ask me anything, fix your code, generate images, and more!</p>
        <div class="suggestion-grid">
          <button class="suggestion-btn" onclick="useSuggestion('How do I fix a 404 error in my website?')">
            <strong>💻 Fix my error</strong>How do I fix a 404 error?
          </button>
          <button class="suggestion-btn" onclick="useSuggestion('Explain what is Artificial Intelligence in simple words')">
            <strong>🧠 Learn something</strong>What is Artificial Intelligence?
          </button>
          <button class="suggestion-btn" onclick="useSuggestion('Write HTML code for a simple login form')">
            <strong>🌐 Generate code</strong>Write a HTML login form
          </button>
          <button class="suggestion-btn" onclick="useSuggestion('What are the best career options in India for 2025?')">
            <strong>🇮🇳 India focused</strong>Best careers in India 2025
          </button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-box">
        <textarea id="userInput" placeholder="Ask AI Chetan anything..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
      <div class="input-note">AI Chetan · Made in India 🇮🇳 · Free to use</div>
    </div>
  </div>
</div>

<script>
const TOOLS = {
  chat:    { icon:'💬', name:'Smart Q&A',         desc:'Ask anything — get accurate answers',          placeholder:'Ask AI Chetan anything...' },
  webdev:  { icon:'💻', name:'Web Dev Help',       desc:'Fix errors, debug code, learn web development', placeholder:'Paste your error or ask a coding question...' },
  website: { icon:'🌐', name:'Website Generator',  desc:'Describe your website and get the code',        placeholder:'Describe the website you want to create...' },
  image:   { icon:'🖼️', name:'Image Generator',    desc:'Describe an image and generate it with AI',     placeholder:'Describe the image you want to create...' },
  video:   { icon:'🎬', name:'Short Video Creator', desc:'Create short video scripts and ideas',          placeholder:'Describe the video you want to create...' },
  voice:   { icon:'🎙️', name:'AI Voice Generator', desc:'Convert your text to natural AI voice',         placeholder:'Type the text you want to convert to voice...' },
};

let currentTool = 'chat';
let isTyping = false;
let chatHistory = [];

const SYSTEM_PROMPTS = {
  chat:    'You are AI Chetan, India\'s smart AI assistant. Give accurate, helpful answers. Never give false information. Be friendly and clear. End responses with a helpful tip when relevant.',
  webdev:  'You are AI Chetan, an expert web developer assistant. Help fix errors, explain code, and teach web development step by step. Format code properly. Be encouraging to beginners.',
  website: 'You are AI Chetan, a website generator. When given a description, generate complete clean HTML+CSS code for a website. Always provide working, copy-paste ready code.',
  image:   'You are AI Chetan. The user wants to generate an image but this feature is coming soon. Apologize kindly, describe what the image would look like in detail, and tell them image generation will be available soon in AI Chetan.',
  video:   'You are AI Chetan. Help users create short video scripts, storyboards, and content ideas. Give structured scripts with scenes, dialogue, and visual descriptions.',
  voice:   'You are AI Chetan. The user wants AI voice generation. This feature is coming soon. For now, read back their text clearly, suggest how it should be spoken (tone, pace), and tell them voice generation is coming soon.',
};

function switchTool(tool) {
  document.querySelectorAll('.tool-item').forEach(el => el.classList.remove('active'));
  document.getElementById('tool-' + tool).classList.add('active');
  currentTool = tool;
  const t = TOOLS[tool];
  document.getElementById('toolIcon').textContent = t.icon;
  document.getElementById('toolName').textContent = t.name;
  document.getElementById('toolDesc').textContent = t.desc;
  document.getElementById('userInput').placeholder = t.placeholder;
  newChat();
  if (window.innerWidth <= 768) toggleSidebar();
}

function newChat() {
  chatHistory = [];
  const msgs = document.getElementById('messages');
  msgs.innerHTML = `
    <div class="welcome" id="welcomeScreen">
      <div class="welcome-icon">🤖</div>
      <h2>How can I help you today?</h2>
      <p>I am AI Chetan — India's AI. Ask me anything!</p>
      <div class="suggestion-grid">
        <button class="suggestion-btn" onclick="useSuggestion('How do I fix a 404 error in my website?')"><strong>💻 Fix my error</strong>How do I fix a 404 error?</button>
        <button class="suggestion-btn" onclick="useSuggestion('Explain what is Artificial Intelligence in simple words')"><strong>🧠 Learn something</strong>What is Artificial Intelligence?</button>
        <button class="suggestion-btn" onclick="useSuggestion('Write HTML code for a simple login form')"><strong>🌐 Generate code</strong>Write a HTML login form</button>
        <button class="suggestion-btn" onclick="useSuggestion('What are the best career options in India for 2025?')"><strong>🇮🇳 India focused</strong>Best careers in India 2025</button>
      </div>
    </div>`;
}

function useSuggestion(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isTyping) return;

  const welcome = document.getElementById('welcomeScreen');
  if (welcome) welcome.remove();

  addMessage('user', text);
  chatHistory.push({ role: 'user', content: text });
  input.value = '';
  input.style.height = 'auto';

  isTyping = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPTS[currentTool],
        messages: chatHistory
      })
    });
    const data = await response.json();
    const reply = data.content?.[0]?.text || 'Sorry, I could not get a response. Please try again!';
    removeTyping();
    addMessage('ai', reply);
    chatHistory.push({ role: 'assistant', content: reply });
  } catch (err) {
    removeTyping();
    addMessage('ai', 'Oops! Something went wrong. Please check your internet and try again. AI Chetan is here to help! 🇮🇳');
  }

  isTyping = false;
  document.getElementById('sendBtn').disabled = false;
}

function addMessage(role, text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg-row ' + role;
  const formattedText = text.replace(/```([\s\S]*?)```/g, '<pre style="background:#f4f4f4;padding:12px;border-radius:8px;overflow-x:auto;font-size:13px;margin-top:8px;"><code>$1</code></pre>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
  div.innerHTML = `
    <div class="msg-avatar ${role}">${role === 'ai' ? 'AC' : '👤'}</div>
    <div>
      <div class="msg-name ${role}">${role === 'ai' ? 'AI Chetan' : 'You'}</div>
      <div class="msg-bubble ${role}">${formattedText}</div>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'typing-row'; div.id = 'typingIndicator';
  div.innerHTML = `<div class="msg-avatar ai">AC</div><div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}
</script>
</body>
</html>
