<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat — AI Chetan</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#F5F5F5;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
nav{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;background:white;box-shadow:0 2px 12px rgba(0,0,0,0.08);flex-shrink:0;}
.logo{font-family:'Baloo 2',cursive;font-size:1.4rem;font-weight:800;color:#FF6B00;}
.logo span{color:#138808;}
.nav-right{display:flex;align-items:center;gap:10px;}
.user-name{font-size:0.82rem;font-weight:600;color:#333;}
.logout-btn{padding:6px 14px;background:#fff;border:2px solid #FF6B00;color:#FF6B00;border-radius:20px;font-size:0.78rem;font-weight:600;cursor:pointer;}
.logout-btn:hover{background:#FF6B00;color:white;}
.toolbar{background:white;border-bottom:1px solid #eee;padding:8px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;}
.mode-btn{padding:7px 14px;border:2px solid #eee;border-radius:20px;font-size:0.78rem;font-weight:600;cursor:pointer;background:white;color:#666;font-family:'Poppins',sans-serif;transition:all 0.2s;}
.mode-btn.active{background:#FF6B00;color:white;border-color:#FF6B00;}
.lang-select{padding:6px 10px;border:2px solid #FF6B00;border-radius:20px;font-size:0.76rem;font-family:'Poppins',sans-serif;color:#333;background:white;cursor:pointer;outline:none;}
.chat-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
.msg-row{display:flex;gap:10px;align-items:flex-end;}
.msg-row.user{flex-direction:row-reverse;}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.avatar.ai{background:#FF6B00;}
.avatar.user{background:#138808;color:white;font-size:0.78rem;font-weight:700;}
.bubble{max-width:75%;padding:11px 15px;border-radius:18px;font-size:0.88rem;line-height:1.55;}
.bubble.ai{background:white;color:#222;border-bottom-left-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.bubble.user{background:#FF6B00;color:white;border-bottom-right-radius:4px;}
.bubble.typing{display:flex;gap:5px;align-items:center;padding:14px 20px;}
.dot{width:8px;height:8px;background:#ccc;border-radius:50%;animation:bounce 1.2s infinite;}
.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-8px);}}
.translated-tag{font-size:0.68rem;color:#FF6B00;margin-top:3px;font-style:italic;}
.user-img-preview{max-width:200px;border-radius:12px;margin-bottom:6px;display:block;}
.gen-img{max-width:260px;border-radius:14px;margin-top:8px;box-shadow:0 4px 16px rgba(0,0,0,0.15);display:block;cursor:pointer;}
.img-tag{font-size:0.7rem;color:#888;margin-top:4px;}
.download-btn{display:inline-block;margin-top:6px;padding:5px 14px;background:#FF6B00;color:white;border-radius:20px;font-size:0.75rem;font-weight:600;text-decoration:none;cursor:pointer;border:none;font-family:'Poppins',sans-serif;}
.input-area{background:white;padding:10px 14px 12px;border-top:1px solid #eee;flex-shrink:0;}
.chat-input-row{display:flex;gap:8px;align-items:center;}
.chat-input-row input{flex:1;padding:11px 14px;border:2px solid #f0f0f0;border-radius:25px;font-size:0.87rem;font-family:'Poppins',sans-serif;outline:none;}
.chat-input-row input:focus{border-color:#FF6B00;}
.icon-btn{width:42px;height:42px;border:none;border-radius:50%;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.speak-btn{background:#f0f0f0;color:#333;}
.speak-btn.listening{background:#FF6B00;color:white;animation:pulse 1s infinite;}
.img-upload-btn{background:#f0f0f0;color:#333;}
.send-btn{background:#FF6B00;color:white;}
.send-btn:hover{background:#e55a00;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,107,0,0.4);}50%{box-shadow:0 0 0 10px rgba(255,107,0,0);}}
.upload-preview{display:none;align-items:center;gap:10px;margin-bottom:8px;background:#fff8f0;padding:8px 12px;border-radius:12px;border:1px solid #ffe0cc;}
.upload-preview img{width:48px;height:48px;object-fit:cover;border-radius:8px;}
.upload-preview-name{font-size:0.78rem;color:#555;flex:1;}
.remove-upload{background:none;border:none;color:#FF6B00;font-size:1rem;cursor:pointer;font-weight:700;}
.img-gen-wrap{display:flex;flex-direction:column;gap:8px;}
.style-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.style-label{font-size:0.75rem;color:#666;font-weight:600;}
.style-chip{padding:4px 11px;border:1.5px solid #eee;border-radius:15px;font-size:0.73rem;cursor:pointer;background:white;color:#666;font-family:'Poppins',sans-serif;}
.style-chip.selected{background:#FF6B00;color:white;border-color:#FF6B00;}
.img-gen-row{display:flex;gap:8px;}
.img-gen-row input{flex:1;padding:11px 14px;border:2px solid #f0f0f0;border-radius:25px;font-size:0.87rem;font-family:'Poppins',sans-serif;outline:none;}
.img-gen-row input:focus{border-color:#FF6B00;}
.gen-btn{padding:11px 20px;background:linear-gradient(135deg,#FF6B00,#FF9500);color:white;border:none;border-radius:25px;font-size:0.85rem;font-weight:600;cursor:pointer;font-family:'Poppins',sans-serif;white-space:nowrap;}
.hidden{display:none;}
</style>
</head>
<body>

<nav>
  <div class="logo">AI <span>Chetan</span> 🇮🇳</div>
  <div class="nav-right">
    <span class="user-name" id="userName">👤 User</span>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="toolbar">
  <button class="mode-btn active" id="btnChat" onclick="setMode('chat')">💬 Chat</button>
  <button class="mode-btn" id="btnImage" onclick="setMode('image')">🎨 Generate Image</button>
  <select class="lang-select" id="langSelect" onchange="onLangChange()">
    <option value="en">🌐 English</option>
    <option value="hi">हिंदी</option>
    <option value="bn">বাংলা</option>
    <option value="te">తెలుగు</option>
    <option value="mr">मराठी</option>
    <option value="ta">தமிழ்</option>
    <option value="gu">ગુજરાતી</option>
    <option value="kn">ಕನ್ನಡ</option>
    <option value="ml">മലയാളം</option>
    <option value="pa">ਪੰਜਾਬੀ</option>
    <option value="or">ଓଡ଼ିଆ</option>
    <option value="as">অসমীয়া</option>
    <option value="ur">اردو</option>
    <option value="ne">नेपाली</option>
    <option value="si">සිංහල</option>
    <option value="mai">मैथिली</option>
    <option value="kok">Konkani</option>
    <option value="doi">डोगरी</option>
    <option value="mni">মৈতৈলোন্</option>
    <option value="ks">کٲشُر</option>
    <option value="sa">संस्कृत</option>
    <option value="sd">سنڌي</option>
  </select>
</div>

<div class="chat-area" id="chatArea">
  <div class="msg-row">
    <div class="avatar ai">🤖</div>
    <div>
      <div class="bubble ai">
        Namaste! 🙏 I am <strong>AI Chetan</strong> — India's smartest AI!<br><br>
        💬 Ask me anything in any Indian language<br>
        🖼️ Share an image using the image button below<br>
        🎨 Switch to <strong>Generate Image</strong> to create AI art<br>
        🎙️ Use mic to speak in your language!
      </div>
    </div>
  </div>
</div>

<div class="input-area">
  <div id="chatInputSection">
    <div class="upload-preview" id="uploadPreview">
      <img id="previewThumb" src="" alt="preview"/>
      <span class="upload-preview-name" id="previewName">image.jpg</span>
      <button class="remove-upload" onclick="removeUpload()">✕</button>
    </div>
    <div class="chat-input-row">
      <button class="icon-btn speak-btn" id="speakBtn" onclick="toggleVoice()" title="Speak">🎙️</button>
      <button class="icon-btn img-upload-btn" onclick="document.getElementById('fileInput').click()" title="Share image">🖼️</button>
      <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleImageUpload(event)"/>
      <input type="text" id="userInput" placeholder="Type or speak your question..."/>
      <button class="icon-btn send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <div id="imageGenSection" class="hidden">
    <div class="img-gen-wrap">
      <div class="style-row">
        <span class="style-label">Style:</span>
        <button class="style-chip selected" onclick="selectStyle(this,'realistic')">📷 Realistic</button>
        <button class="style-chip" onclick="selectStyle(this,'cartoon')">🎨 Cartoon</button>
        <button class="style-chip" onclick="selectStyle(this,'anime')">⛩️ Anime</button>
        <button class="style-chip" onclick="selectStyle(this,'oil painting')">🖼️ Oil Paint</button>
        <button class="style-chip" onclick="selectStyle(this,'watercolor')">💧 Watercolor</button>
        <button class="style-chip" onclick="selectStyle(this,'3d render')">🧊 3D</button>
        <button class="style-chip" onclick="selectStyle(this,'indian traditional art')">🪔 Indian Art</button>
      </div>
      <div class="img-gen-row">
        <input type="text" id="imagePrompt" placeholder="Describe your image... (any language)" onkeydown="if(event.key==='Enter') generateImage()"/>
        <button class="gen-btn" onclick="generateImage()">✨ Generate</button>
      </div>
    </div>
  </div>
</div>

<script>
  // ===== USER =====
  const userData = JSON.parse(localStorage.getItem('ai_chetan_user') || '{}');
  if (!userData.name) { window.location.href = 'login.html'; }
  document.getElementById('userName').textContent = '👤 ' + (userData.name || 'User');
  function logout() { localStorage.removeItem('ai_chetan_user'); window.location.href = 'index.html'; }

  // ===== GROQ KEY =====
  const GROQ_KEY = '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';
  // Using llama3-70b — best free model on Groq ✅
  const GROQ_MODEL = 'llama3-70b-8192';

  // ===== MODE =====
  let currentMode = 'chat';
  function setMode(mode) {
    currentMode = mode;
    document.getElementById('btnChat').classList.toggle('active', mode === 'chat');
    document.getElementById('btnImage').classList.toggle('active', mode === 'image');
    document.getElementById('chatInputSection').classList.toggle('hidden', mode !== 'chat');
    document.getElementById('imageGenSection').classList.toggle('hidden', mode !== 'image');
  }

  // ===== STYLE =====
  let selectedStyle = 'realistic';
  function selectStyle(el, style) {
    document.querySelectorAll('.style-chip').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    selectedStyle = style;
  }

  // ===== LANGUAGE =====
  const langNames = {
    en:'English',hi:'Hindi',bn:'Bengali',te:'Telugu',mr:'Marathi',
    ta:'Tamil',gu:'Gujarati',kn:'Kannada',ml:'Malayalam',pa:'Punjabi',
    or:'Odia',as:'Assamese',ur:'Urdu',ne:'Nepali',si:'Sinhala',
    mai:'Maithili',kok:'Konkani',doi:'Dogri',mni:'Manipuri',
    ks:'Kashmiri',sa:'Sanskrit',sd:'Sindhi'
  };
  let selectedLang = 'en';
  function onLangChange() {
    selectedLang = document.getElementById('langSelect').value;
    document.getElementById('userInput').placeholder =
      selectedLang === 'en' ? 'Type or speak your question...' : `Type in ${langNames[selectedLang]}...`;
  }

  // ===== TRANSLATE =====
  async function translateText(text, targetLang) {
    if (!targetLang || targetLang === 'en') return text;
    try {
      const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`;
      const res = await fetch(url);
      const data = await res.json();
      return data[0].map(x => x[0]).join('');
    } catch(e) { return text; }
  }

  async function translateToEnglish(text, srcLang) {
    if (!srcLang || srcLang === 'en') return text;
    try {
      const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${srcLang}&tl=en&dt=t&q=${encodeURIComponent(text)}`;
      const res = await fetch(url);
      const data = await res.json();
      return data[0].map(x => x[0]).join('');
    } catch(e) { return text; }
  }

  // ===== CHAT HELPERS =====
  const chatArea = document.getElementById('chatArea');
  let messages = [
    { role: 'system', content: "You are AI Chetan, India's smartest AI assistant. Be helpful, friendly, and give clear useful answers. You are proud to be an Indian AI platform. Keep answers clear and not too long." }
  ];

  function addBubble(html, type, showLang) {
    const row = document.createElement('div');
    row.className = 'msg-row ' + (type === 'user' ? 'user' : '');
    const avatar = document.createElement('div');
    avatar.className = 'avatar ' + type;
    avatar.textContent = type === 'user' ? (userData.name || 'U').charAt(0).toUpperCase() : '🤖';
    const wrap = document.createElement('div');
    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + type;
    bubble.innerHTML = html;
    wrap.appendChild(bubble);
    if (showLang && selectedLang !== 'en') {
      const tag = document.createElement('div');
      tag.className = 'translated-tag';
      tag.textContent = '🌐 ' + (langNames[selectedLang] || selectedLang);
      wrap.appendChild(tag);
    }
    if (type === 'user') { row.appendChild(wrap); row.appendChild(avatar); }
    else { row.appendChild(avatar); row.appendChild(wrap); }
    chatArea.appendChild(row);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function addTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row'; row.id = 'typingRow';
    row.innerHTML = `<div class="avatar ai">🤖</div><div class="bubble ai typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    chatArea.appendChild(row);
    chatArea.scrollTop = chatArea.scrollHeight;
  }
  function removeTyping() { const t = document.getElementById('typingRow'); if(t) t.remove(); }

  // ===== IMAGE UPLOAD =====
  let uploadedImageBase64 = null;

  function handleImageUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      uploadedImageBase64 = e.target.result;
      document.getElementById('previewThumb').src = uploadedImageBase64;
      document.getElementById('previewName').textContent = file.name;
      document.getElementById('uploadPreview').style.display = 'flex';
    };
    reader.readAsDataURL(file);
    event.target.value = '';
  }

  function removeUpload() {
    uploadedImageBase64 = null;
    document.getElementById('uploadPreview').style.display = 'none';
    document.getElementById('previewThumb').src = '';
  }

  // ===== SEND MESSAGE =====
  async function sendMessage() {
    const input = document.getElementById('userInput');
    const userText = input.value.trim();
    if (!userText && !uploadedImageBase64) return;
    input.value = '';

    // Show user message
    const row = document.createElement('div');
    row.className = 'msg-row user';
    const avatar = document.createElement('div');
    avatar.className = 'avatar user';
    avatar.textContent = (userData.name || 'U').charAt(0).toUpperCase();
    const wrap = document.createElement('div');
    if (uploadedImageBase64) {
      const img = document.createElement('img');
      img.className = 'user-img-preview';
      img.src = uploadedImageBase64;
      wrap.appendChild(img);
    }
    if (userText) {
      const bubble = document.createElement('div');
      bubble.className = 'bubble user';
      bubble.textContent = userText;
      wrap.appendChild(bubble);
    }
    row.appendChild(wrap); row.appendChild(avatar);
    chatArea.appendChild(row);
    chatArea.scrollTop = chatArea.scrollHeight;

    // Translate to English for Groq
    const englishText = await translateToEnglish(userText || 'Describe this image in detail.', selectedLang);

    // If image uploaded — describe it using Groq text (llama3 doesn't do vision, so we tell AI user shared image)
    let promptContent = englishText;
    if (uploadedImageBase64) {
      promptContent = `The user has shared an image with you. They said: "${englishText}". Please respond helpfully. Note: Since you cannot directly see images, tell the user you can see they shared an image and ask them to describe what's in it, or let them know to use the Generate Image feature to create AI art from text descriptions.`;
    }

    messages.push({ role: 'user', content: promptContent });
    const imgSnapshot = uploadedImageBase64;
    removeUpload();
    addTyping();

    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + GROQ_KEY
        },
        body: JSON.stringify({
          model: GROQ_MODEL,
          messages: messages,
          max_tokens: 600,
          temperature: 0.7
        })
      });

      const data = await res.json();
      removeTyping();

      if (data.error) {
        addBubble('❌ Groq Error: ' + data.error.message, 'ai', false);
        return;
      }

      let reply = data.choices?.[0]?.message?.content || 'Sorry, no response.';
      messages.push({ role: 'assistant', content: reply });

      // Translate reply to selected language
      const translated = await translateText(reply, selectedLang);
      addBubble(translated, 'ai', selectedLang !== 'en');

    } catch(err) {
      removeTyping();
      addBubble('❌ Network error: ' + err.message + '. Please check your internet.', 'ai', false);
    }
  }

  // ===== GENERATE IMAGE (Pollinations AI — 100% FREE) =====
  async function generateImage() {
    const promptInput = document.getElementById('imagePrompt');
    const userPrompt = promptInput.value.trim();
    if (!userPrompt) { alert('Please describe the image you want to generate!'); return; }
    promptInput.value = '';

    const englishPrompt = await translateToEnglish(userPrompt, selectedLang);
    const fullPrompt = `${englishPrompt}, ${selectedStyle} style, high quality, detailed, 4k`;

    addBubble('🎨 ' + userPrompt, 'user', false);
    addTyping();

    const seed = Math.floor(Math.random() * 999999);
    const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(fullPrompt)}?width=512&height=512&seed=${seed}&nologo=true&enhance=true`;

    // Wait for Pollinations to generate (2 seconds)
    await new Promise(r => setTimeout(r, 2000));
    removeTyping();

    const row = document.createElement('div');
    row.className = 'msg-row';
    const avatar = document.createElement('div');
    avatar.className = 'avatar ai';
    avatar.textContent = '🤖';
    const wrap = document.createElement('div');

    const textBubble = document.createElement('div');
    textBubble.className = 'bubble ai';
    textBubble.textContent = '✨ Your AI generated image is ready!';

    const img = document.createElement('img');
    img.className = 'gen-img';
    img.alt = 'AI Generated Image';
    img.title = 'Click to see full size';
    img.onclick = () => window.open(imageUrl, '_blank');

    const tag = document.createElement('div');
    tag.className = 'img-tag';
    tag.textContent = '🖼️ Style: ' + selectedStyle + ' • Pollinations AI (Free)';

    const dlBtn = document.createElement('a');
    dlBtn.className = 'download-btn';
    dlBtn.href = imageUrl;
    dlBtn.target = '_blank';
    dlBtn.textContent = '⬇️ Download Image';

    img.onerror = () => {
      img.style.display = 'none';
      textBubble.textContent = '❌ Could not generate image. Try a simpler description!';
      dlBtn.style.display = 'none';
    };

    // Set src after appending so onerror works
    img.src = imageUrl;

    wrap.appendChild(textBubble);
    wrap.appendChild(img);
    wrap.appendChild(tag);
    wrap.appendChild(dlBtn);
    row.appendChild(avatar);
    row.appendChild(wrap);
    chatArea.appendChild(row);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  // ===== VOICE =====
  let recognition = null;
  let isListening = false;

  function toggleVoice() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      alert('Voice not supported. Use Chrome browser!');
      return;
    }
    if (isListening) { recognition.stop(); return; }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    const voiceLangMap = {
      en:'en-IN',hi:'hi-IN',bn:'bn-IN',te:'te-IN',mr:'mr-IN',
      ta:'ta-IN',gu:'gu-IN',kn:'kn-IN',ml:'ml-IN',pa:'pa-IN',
      ur:'ur-PK',ne:'ne-NP',si:'si-LK',or:'or-IN'
    };
    recognition.lang = voiceLangMap[selectedLang] || 'en-IN';
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.onstart = () => {
      isListening = true;
      document.getElementById('speakBtn').classList.add('listening');
      document.getElementById('speakBtn').textContent = '🔴';
      document.getElementById('userInput').placeholder = 'Listening... speak now!';
    };
    recognition.onresult = (e) => {
      document.getElementById('userInput').value = e.results[0][0].transcript;
      sendMessage();
    };
    recognition.onend = () => {
      isListening = false;
      document.getElementById('speakBtn').classList.remove('listening');
      document.getElementById('speakBtn').textContent = '🎙️';
      document.getElementById('userInput').placeholder = 'Type or speak your question...';
    };
    recognition.onerror = () => {
      isListening = false;
      document.getElementById('speakBtn').classList.remove('listening');
      document.getElementById('speakBtn').textContent = '🎙️';
    };
    recognition.start();
  }

  document.getElementById('userInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMessage();
  });
</script>
</body>
</html>
