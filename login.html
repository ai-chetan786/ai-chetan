<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#FFF8F0 0%,#FFE8CC 100%);min-height:100vh;display:flex;flex-direction:column;}
nav{display:flex;justify-content:space-between;align-items:center;padding:18px 40px;background:white;box-shadow:0 2px 12px rgba(0,0,0,0.07);}
.logo{font-family:'Baloo 2',cursive;font-size:1.8rem;font-weight:800;color:#FF6B00;text-decoration:none;}
.logo span{color:#138808;}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
.card{background:white;border-radius:24px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.1);}
.card-title{font-family:'Baloo 2',cursive;font-size:1.8rem;font-weight:800;color:#1a1a1a;margin-bottom:6px;}
.card-sub{color:#888;font-size:0.9rem;margin-bottom:28px;}
.form-group{margin-bottom:18px;}
label{display:block;font-size:0.85rem;font-weight:600;color:#444;margin-bottom:6px;}
input{width:100%;padding:12px 16px;border:2px solid #f0f0f0;border-radius:12px;font-size:0.95rem;font-family:'Poppins',sans-serif;transition:all 0.3s;outline:none;}
input:focus{border-color:#FF6B00;box-shadow:0 0 0 3px rgba(255,107,0,0.1);}
.btn{width:100%;padding:14px;background:#FF6B00;color:white;border:none;border-radius:12px;font-size:1rem;font-weight:600;font-family:'Poppins',sans-serif;cursor:pointer;transition:all 0.3s;margin-top:8px;}
.btn:hover{background:#e55a00;transform:translateY(-1px);}
.btn:disabled{background:#ccc;cursor:not-allowed;transform:none;}
.divider{text-align:center;margin:20px 0;color:#999;font-size:0.85rem;}
.register-link{text-align:center;font-size:0.9rem;color:#666;}
.register-link a{color:#FF6B00;font-weight:600;text-decoration:none;}
.msg{padding:12px 16px;border-radius:10px;margin-bottom:16px;font-size:0.9rem;display:none;}
.msg.success{background:#E8F5E9;color:#2E7D32;border:1px solid #A5D6A7;}
.msg.error{background:#FFEBEE;color:#C62828;border:1px solid #EF9A9A;}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">AI <span>Chetan</span></a>
  <a href="register.html" style="color:#FF6B00;font-weight:600;text-decoration:none;">New user? Register Free</a>
</nav>
<div class="main">
  <div class="card">
    <div class="card-title">👋 Welcome Back!</div>
    <div class="card-sub">Login to your AI Chetan account</div>
    <div class="msg" id="msg"></div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="Enter your email"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password"/>
    </div>
    <button class="btn" id="loginBtn" onclick="login()">Login to AI Chetan</button>
    <div class="divider">— or —</div>
    <div class="register-link">Don't have an account? <a href="register.html">Register Free</a></div>
  </div>
</div>

<script>
// ⚠️ REPLACE THESE WITH YOUR ACTUAL SUPABASE DETAILS
// ✅ After — client properly initialized
const supabase = window.supabase.createClient('https://nnvwcmhwdgpfwtlezboj.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5udndjbWh3ZGdwZnd0bGV6Ym9qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNDY4ODcsImV4cCI6MjA5MjYyMjg4N30.yVovl7THGKtxWKzlKF7tifIkPofq6vXdexTeFWmq5AA');

function showMsg(text, type) {
  const msg = document.getElementById('msg');
  msg.textContent = text;
  msg.className = 'msg ' + type;
  msg.style.display = 'block';
}

async function hashPassword(password) {
  const encoder = new TextEncoder();
  const data = encoder.encode(password);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');

  if (!email || !password) {
    showMsg('❌ Please fill all fields!', 'error'); return;
  }

  btn.disabled = true;
  btn.textContent = 'Logging in...';

  try {
    const hashedPassword = await hashPassword(password);

    const { data, error } = await supabase
      .from('Users')
      .select('*')
      .eq('Email', email)
      .eq('Password', hashedPassword);

    if (error) throw error;

    if (data && data.length > 0) {
      localStorage.setItem('ai_chetan_user', JSON.stringify({ name: data[0].Name, email: data[0].Email }));
      showMsg('✅ Login successful! Redirecting...', 'success');
      setTimeout(() => window.location.href = 'chat.html', 1500);
    } else {
      showMsg('❌ Wrong email or password. Please try again!', 'error');
      btn.disabled = false;
      btn.textContent = 'Login to AI Chetan';
    }
  } catch (err) {
    showMsg('❌ Error: ' + err.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Login to AI Chetan';
  }
}
</script>
</body>
</html>
