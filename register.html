<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Register — AI Chetan</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#FFF8F0 0%,#FFE8CC 100%);min-height:100vh;display:flex;flex-direction:column;}
nav{display:flex;justify-content:space-between;align-items:center;padding:18px 40px;background:white;box-shadow:0 2px 12px rgba(0,0,0,0.07);}
.logo{font-family:'Baloo 2',cursive;font-size:1.8rem;font-weight:800;color:#FF6B00;text-decoration:none;}
.logo span{color:#138808;}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
.card{background:white;border-radius:24px;padding:40px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,0.1);}
.card-title{font-family:'Baloo 2',cursive;font-size:1.8rem;font-weight:800;color:#1a1a1a;margin-bottom:6px;}
.card-sub{color:#888;font-size:0.9rem;margin-bottom:28px;}
.form-group{margin-bottom:18px;}
label{display:block;font-size:0.85rem;font-weight:600;color:#444;margin-bottom:6px;}
input{width:100%;padding:12px 16px;border:2px solid #f0f0f0;border-radius:12px;font-size:0.95rem;font-family:'Poppins',sans-serif;transition:all 0.3s;outline:none;}
input:focus{border-color:#FF6B00;box-shadow:0 0 0 3px rgba(255,107,0,0.1);}
.btn{width:100%;padding:14px;background:#FF6B00;color:white;border:none;border-radius:12px;font-size:1rem;font-weight:600;font-family:'Poppins',sans-serif;cursor:pointer;transition:all 0.3s;margin-top:8px;}
.btn:hover{background:#e55a00;transform:translateY(-1px);}
.btn:disabled{background:#ccc;cursor:not-allowed;transform:none;}
.divider{text-align:center;margin:20px 0;color:#999;font-size:0.85rem;}
.login-link{text-align:center;font-size:0.9rem;color:#666;}
.login-link a{color:#FF6B00;font-weight:600;text-decoration:none;}
.msg{padding:12px 16px;border-radius:10px;margin-bottom:16px;font-size:0.9rem;display:none;}
.msg.success{background:#E8F5E9;color:#2E7D32;border:1px solid #A5D6A7;}
.msg.error{background:#FFEBEE;color:#C62828;border:1px solid #EF9A9A;}
.password-hint{font-size:0.75rem;color:#999;margin-top:4px;}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">AI <span>Chetan</span></a>
  <a href="login.html" style="color:#FF6B00;font-weight:600;text-decoration:none;">Already have account? Login</a>
</nav>
<div class="main">
  <div class="card">
    <div class="card-title">🚀 Create Account</div>
    <div class="card-sub">Join AI Chetan — India's smartest AI assistant</div>
    <div class="msg" id="msg"></div>
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Enter your full name"/>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="Enter your email"/>
    </div>
    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="Enter your phone number"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Create a strong password"/>
      <div class="password-hint">Minimum 8 characters</div>
    </div>
    <button class="btn" id="registerBtn" onclick="register()">Create My Account</button>
    <div class="divider">— or —</div>
    <div class="login-link">Already have an account? <a href="login.html">Login here</a></div>
  </div>
</div>

<script>
// ⚠️ REPLACE THESE WITH YOUR ACTUAL SUPABASE DETAILS
const SUPABASE_URL = 'https://nnvwcmhwdgpfwtlezboj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5udndjbWh3ZGdwZnd0bGV6Ym9qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNDY4ODcsImV4cCI6MjA5MjYyMjg4N30.yVovl7THGKtxWKzlKF7tifIkPofq6vXdexTeFWmq5AA';

function showMsg(text, type) {
  const msg = document.getElementById('msg');
  msg.textContent = text;
  msg.className = 'msg ' + type;
  msg.style.display = 'block';
}

async function hashPassword(password) {
  const encoder = new TextEncoder();
  const data = encoder.encode(password);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function register() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('registerBtn');

  if (!name || !email || !phone || !password) {
    showMsg('❌ Please fill all fields!', 'error'); return;
  }
  if (password.length < 8) {
    showMsg('❌ Password must be at least 8 characters!', 'error'); return;
  }

  btn.disabled = true;
  btn.textContent = 'Creating account...';

  try {
    // Check if email already exists
    const { data: existing } = await supabase
      .from('Users')
      .select('email')
      .eq('email', email);

    if (existing && existing.length > 0) {
      showMsg('❌ Email already registered! Please login.', 'error');
      btn.disabled = false;
      btn.textContent = 'Create My Account';
      return;
    }

    // Hash password safely
    const hashedPassword = await hashPassword(password);

    // Save to database
    const { error } = await supabase
      .from('Users')
      .insert([{ Name: name, Email: email, Phone_No: phone, Password: hashedPassword }]);

    if (error) throw error;

    showMsg('✅ Account created! Redirecting to login...', 'success');
    setTimeout(() => window.location.href = 'login.html', 2000);

  } catch (err) {
    showMsg('❌ Error: ' + err.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Create My Account';
  }
}
</script>
</body>
</html>
